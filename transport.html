<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Tracking - Udaan Vidhyalaya</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'school-blue': '#003366',
                        'school-gold': '#C5A059',
                        'school-gold-light': '#E5C585',
                        'school-white': '#FFFFFF',
                        'school-light-gray': '#F5F5F5',
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'sans-serif'],
                        'heading': ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 font-sans min-h-[100dvh] flex flex-col">

    <!-- Header -->
    <header class="bg-school-blue text-white py-4 px-4 md:px-6 flex flex-wrap gap-2 justify-between items-center shadow-lg z-10">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-school-gold text-xl"><i class="fas fa-arrow-left"></i></a>
            <h1 class="font-bold text-base md:text-xl">Bus Tracking - Route 4</h1>
        </div>
        <div class="text-xs md:text-sm bg-white/10 px-3 py-1 rounded">
            Live Status: <span class="text-green-400 font-bold animate-pulse">Running</span>
        </div>
    </header>

    <!-- Map Container (Mockup) -->
    <div class="flex-1 relative bg-gray-200">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3503.468204646549!2d77.34863331508246!3d28.58552698243644!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390ce516e45f9175%3A0xc6cb512e947cb292!2sNoida%2C%20Uttar%20Pradesh!5e0!3m2!1sen!2sin!4v1647429672656!5m2!1sen!2sin"
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>

        <!-- Bus Overlay Info -->
        <div
            class="absolute bottom-6 left-6 right-6 md:left-auto md:right-6 md:w-96 bg-white rounded-xl shadow-2xl p-6 border-l-4 border-school-gold">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="font-bold text-school-blue text-lg">School Bus: UP-16-BZ-1234</h3>
                    <p class="text-gray-500 text-sm">Driver: Mr. Ram Singh (+91 98xxx xxxxx)</p>
                </div>
                <div
                    class="w-12 h-12 bg-school-light-gray rounded-full flex items-center justify-center text-school-blue text-2xl">
                    <i class="fas fa-bus"></i>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
                    <p class="text-sm text-gray-500">Left School: 2:10 PM</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
                    <p class="text-sm font-bold text-school-blue">Current Location: Sector 18 (2 mins away)</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
                    <p class="text-sm text-gray-500">Next Stop: Sector 25</p>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-100 flex justify-between items-center">
                <span class="text-xs text-gray-400">Last updated: Just now</span>
                <button
                    class="bg-school-blue text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-school-gold transition-colors">Call
                    Driver</button>
            </div>
        </div>
    </div>

</body>

</html>
